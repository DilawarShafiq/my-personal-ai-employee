<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 270 H1920 M0 540 H1920 M0 810 H1920"/>
    <path d="M480 0 V1080 M960 0 V1080 M1440 0 V1080"/>
  </g>

  <rect x="0" y="0" width="1920" height="8" fill="url(#accent)"/>

  <!-- Headline -->
  <text x="960" y="360" font-family="Inter, Segoe UI, system-ui, sans-serif"
        font-weight="700" font-size="96" fill="#f8fafc" text-anchor="middle">
    DM me the architecture
  </text>

  <!-- GitHub + LinkedIn links, stacked vertically so full URLs fit -->
  <g font-family="JetBrains Mono, Consolas, monospace">
    <!-- GitHub block -->
    <rect x="260" y="470" width="1400" height="110" rx="16" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="300" y="512" fill="#94a3b8" font-size="22" font-weight="400"
          font-family="Inter, Segoe UI, sans-serif">github</text>
    <text x="300" y="560" fill="#06b6d4" font-size="36" font-weight="500">
      github.com/dilawarshafiq/my-personal-ai-employee
    </text>

    <!-- LinkedIn block -->
    <rect x="260" y="610" width="1400" height="110" rx="16" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="300" y="652" fill="#94a3b8" font-size="22" font-weight="400"
          font-family="Inter, Segoe UI, sans-serif">linkedin</text>
    <text x="300" y="700" fill="#7c3aed" font-size="36" font-weight="500">
      linkedin.com/in/dilawar-shafiq-b8923062
    </text>
  </g>

  <!-- Tag -->
  <text x="960" y="830" font-family="Inter, Segoe UI, system-ui, sans-serif"
        font-weight="300" font-size="30" fill="#94a3b8" text-anchor="middle">
    building HIPAA-compliant AI agents for US healthcare
  </text>

  <!-- Thanks -->
  <text x="960" y="960" font-family="Inter, Segoe UI, system-ui, sans-serif"
        font-weight="400" font-size="26" fill="#64748b" text-anchor="middle">
    thanks to Panaversity for the framing · autosapien · 2026
  </text>

  <rect x="0" y="1072" width="1920" height="8" fill="url(#accent)"/>
</svg>
