<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="accentText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 180 H1280 M0 360 H1280 M0 540 H1280"/>
    <path d="M320 0 V720 M640 0 V720 M960 0 V720"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#accentBar)"/>

  <!-- Top-right Gold tier chip -->
  <g transform="translate(1080, 30)">
    <rect x="0" y="0" width="170" height="40" rx="20" fill="#7c3aed" fill-opacity="0.22"
          stroke="#7c3aed" stroke-width="2"/>
    <text x="85" y="28" font-family="Inter, Segoe UI, system-ui, sans-serif"
          font-weight="700" font-size="18" fill="#c4b5fd" text-anchor="middle">
      GOLD TIER
    </text>
  </g>

  <!-- Right-side AI chip glyph -->
  <g transform="translate(920, 170)" opacity="0.95">
    <rect x="0" y="0" width="260" height="260" rx="26" fill="#1e293b" stroke="#7c3aed" stroke-width="3"/>
    <g fill="#7c3aed">
      <rect x="-14" y="40"  width="14" height="10" rx="2"/>
      <rect x="-14" y="80"  width="14" height="10" rx="2"/>
      <rect x="-14" y="120" width="14" height="10" rx="2"/>
      <rect x="-14" y="160" width="14" height="10" rx="2"/>
      <rect x="-14" y="200" width="14" height="10" rx="2"/>
      <rect x="-14" y="220" width="14" height="10" rx="2"/>
      <rect x="260" y="40"  width="14" height="10" rx="2"/>
      <rect x="260" y="80"  width="14" height="10" rx="2"/>
      <rect x="260" y="120" width="14" height="10" rx="2"/>
      <rect x="260" y="160" width="14" height="10" rx="2"/>
      <rect x="260" y="200" width="14" height="10" rx="2"/>
      <rect x="260" y="220" width="14" height="10" rx="2"/>
    </g>
    <g stroke="#06b6d4" stroke-width="3" fill="none" filter="url(#glow)">
      <path d="M60 80 L130 80 L130 130 L200 130"/>
      <path d="M60 190 L95 190 L95 150 L130 150"/>
      <path d="M200 80 L200 190 L160 190"/>
    </g>
    <circle cx="130" cy="130" r="22" fill="#7c3aed" filter="url(#glow)"/>
    <text x="130" y="140" font-family="Inter, sans-serif" font-size="22" font-weight="700"
          fill="#fff" text-anchor="middle">AI</text>
  </g>

  <!-- Main headline -->
  <g filter="url(#textShadow)">
    <text x="60" y="190" font-family="Inter, Segoe UI, system-ui, sans-serif"
          font-weight="900" font-size="86" fill="#f8fafc">
      I built an
    </text>
    <text x="60" y="310" font-family="Inter, Segoe UI, system-ui, sans-serif"
          font-weight="900" font-size="132" fill="url(#accentText)"
          letter-spacing="-3">
      AI EMPLOYEE
    </text>
    <text x="60" y="410" font-family="Inter, Segoe UI, system-ui, sans-serif"
          font-weight="700" font-size="68" fill="#f8fafc">
      in ONE day
    </text>
  </g>

  <!-- Sub-details band -->
  <rect x="60" y="445" width="820" height="70" rx="14" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="80" y="492" font-family="Inter, Segoe UI, system-ui, sans-serif"
        font-weight="600" font-size="28" fill="#06b6d4">
    HIPAA-safe · Claude Code · Local-first · Healthcare RCM
  </text>

  <!-- Author -->
  <g>
    <text x="60" y="580" font-family="Inter, Segoe UI, system-ui, sans-serif"
          font-weight="700" font-size="32" fill="#c4b5fd">
      Dilawar Shafiq
    </text>
    <text x="60" y="620" font-family="Inter, Segoe UI, system-ui, sans-serif"
          font-weight="400" font-size="24" fill="#94a3b8">
      CEO, autosapien  ·  xEHR.io  ·  rcmemployee.com
    </text>
    <text x="60" y="668" font-family="Inter, Segoe UI, system-ui, sans-serif"
          font-weight="400" font-size="20" fill="#64748b">
      Panaversity Hackathon 0  ·  Personal AI Employee
    </text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="714" width="1280" height="6" fill="url(#accentBar)"/>
</svg>
