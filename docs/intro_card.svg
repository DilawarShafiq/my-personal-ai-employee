<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Grid pattern for "architecture" feel -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 270 H1920 M0 540 H1920 M0 810 H1920"/>
    <path d="M480 0 V1080 M960 0 V1080 M1440 0 V1080"/>
  </g>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1920" height="8" fill="url(#accent)"/>

  <!-- Main title -->
  <text x="120" y="480" font-family="Inter, Segoe UI, system-ui, sans-serif"
        font-weight="700" font-size="108" fill="#f8fafc" filter="url(#glow)">
    autosapien
  </text>
  <text x="120" y="600" font-family="Inter, Segoe UI, system-ui, sans-serif"
        font-weight="400" font-size="56" fill="#a5b4fc">
    Personal AI Employee
  </text>

  <!-- Subtitle -->
  <text x="120" y="680" font-family="Inter, Segoe UI, system-ui, sans-serif"
        font-weight="300" font-size="32" fill="#94a3b8">
    HIPAA-compliant Digital FTE · Claude Code + Obsidian + MCP
  </text>

  <!-- Attribution -->
  <text x="120" y="920" font-family="Inter, Segoe UI, system-ui, sans-serif"
        font-weight="400" font-size="28" fill="#64748b">
    Dilawar Shafiq · CEO, autosapien · xEHR.io · rcmemployee.com
  </text>
  <text x="120" y="970" font-family="Inter, Segoe UI, system-ui, sans-serif"
        font-weight="400" font-size="24" fill="#475569">
    Panaversity Hackathon 0 · 2026
  </text>

  <!-- Tier chip -->
  <rect x="1500" y="120" width="300" height="56" rx="28" fill="#7c3aed" fill-opacity="0.18" stroke="#7c3aed" stroke-width="2"/>
  <text x="1650" y="158" font-family="Inter, Segoe UI, system-ui, sans-serif"
        font-weight="600" font-size="26" fill="#c4b5fd" text-anchor="middle">
    Gold + Platinum-lite
  </text>

  <!-- Accent bar bottom -->
  <rect x="0" y="1072" width="1920" height="8" fill="url(#accent)"/>
</svg>
