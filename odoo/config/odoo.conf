[options]
; ----------------------------------------------------------------------
; autosapien AI Employee — Odoo 19 config
;
; `admin_passwd` is the master password used to create / manage
; databases via the web UI and the /web/database endpoints. Keep in
; sync with ODOO_PASSWORD in .env for the seed_odoo.py script.
; ----------------------------------------------------------------------
admin_passwd = admin
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
default_productivity_apps = True

; Keep the instance single-database so the JSON-RPC `login` call finds
; `autosapien` without needing a db filter.
dbfilter = ^autosapien$
list_db = True
