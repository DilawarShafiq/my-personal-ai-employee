[options]
; Cloud-specific Odoo config — intentionally OMITS db_password so the
; container's ENV vars (HOST / USER / PASSWORD set in compose) take
; effect. Hardcoding db_password here would override them.
;
; proxy_mode=True makes Odoo trust X-Forwarded-Proto from Caddy so it
; generates https:// URLs and session cookies flip secure=true.
admin_passwd = admin
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
default_productivity_apps = True
dbfilter = ^autosapien$
list_db = True
proxy_mode = True
